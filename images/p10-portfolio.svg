<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080b12"/>
      <stop offset="100%" style="stop-color:#0e1420"/>
    </linearGradient>
    <linearGradient id="accent10" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#f4a261"/>
    </linearGradient>
  </defs>

  <rect width="600" height="320" fill="url(#bg10)"/>

  <!-- Particle dots background -->
  <circle cx="50" cy="50" r="1.2" fill="#e63946" opacity="0.3"/>
  <circle cx="150" cy="30" r="0.8" fill="#f4a261" opacity="0.3"/>
  <circle cx="280" cy="60" r="1" fill="#e63946" opacity="0.2"/>
  <circle cx="400" cy="20" r="1.2" fill="#f4a261" opacity="0.25"/>
  <circle cx="520" cy="80" r="0.8" fill="#e63946" opacity="0.3"/>
  <circle cx="560" cy="40" r="1" fill="#f4a261" opacity="0.2"/>
  <circle cx="80" cy="160" r="0.8" fill="#e63946" opacity="0.15"/>
  <circle cx="350" cy="250" r="1" fill="#f4a261" opacity="0.2"/>
  <circle cx="490" cy="290" r="1.2" fill="#e63946" opacity="0.25"/>
  <!-- connecting lines -->
  <line x1="50" y1="50" x2="150" y2="30" stroke="#e63946" stroke-width="0.3" opacity="0.15"/>
  <line x1="150" y1="30" x2="280" y2="60" stroke="#e63946" stroke-width="0.3" opacity="0.1"/>
  <line x1="400" y1="20" x2="520" y2="80" stroke="#e63946" stroke-width="0.3" opacity="0.15"/>

  <!-- Navbar -->
  <rect x="0" y="0" width="600" height="38" fill="rgba(8,11,18,0.9)"/>
  <rect x="0" y="38" width="600" height="1" fill="rgba(255,255,255,0.07)"/>
  <text x="24" y="25" font-family="Arial" font-size="14" fill="#eef2ff" font-weight="bold">CI<tspan fill="#e63946">.</tspan></text>
  <text x="110" y="24" font-family="Arial" font-size="8" fill="#8892b0" letter-spacing="1">ABOUT</text>
  <text x="168" y="24" font-family="Arial" font-size="8" fill="#8892b0" letter-spacing="1">PROJECTS</text>
  <text x="248" y="24" font-family="Arial" font-size="8" fill="#8892b0" letter-spacing="1">SKILLS</text>
  <text x="306" y="24" font-family="Arial" font-size="8" fill="#8892b0" letter-spacing="1">CONTACT</text>
  <rect x="480" y="11" width="70" height="18" rx="3" fill="#e63946"/>
  <text x="515" y="23" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Hire Me →</text>

  <!-- Hero section -->
  <rect x="0" y="39" width="600" height="180" fill="transparent"/>

  <!-- Eyebrow -->
  <rect x="38" y="60" width="22" height="1.5" fill="#e63946"/>
  <text x="68" y="63" font-family="Arial" font-size="8" fill="#e63946" letter-spacing="2">AVAILABLE FOR WORK</text>

  <!-- Name -->
  <text x="38" y="102" font-family="Arial" font-size="36" fill="#eef2ff" font-weight="bold">Your</text>
  <text x="38" y="140" font-family="Arial" font-size="36" fill="#e63946" font-weight="bold">Name</text>

  <!-- Role typewriter -->
  <text x="38" y="162" font-family="Arial" font-size="13" fill="#8892b0">Full-Stack Developer &amp; DevOps Engineer</text>

  <!-- Desc text -->
  <rect x="38" y="172" width="220" height="5" rx="2" fill="#1e2a3a"/>
  <rect x="38" y="181" width="180" height="5" rx="2" fill="#1e2a3a"/>
  <rect x="38" y="190" width="200" height="5" rx="2" fill="#1e2a3a"/>

  <!-- CTA buttons -->
  <rect x="38" y="204" width="100" height="24" rx="5" fill="#e63946"/>
  <text x="88" y="220" font-family="Arial" font-size="9" fill="white" text-anchor="middle">View My Work →</text>
  <rect x="148" y="204" width="85" height="24" rx="5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="190" y="220" font-family="Arial" font-size="9" fill="#eef2ff" text-anchor="middle">Get in Touch</text>

  <!-- Stats -->
  <text x="38" y="244" font-family="Arial" font-size="16" fill="#eef2ff" font-weight="bold">3<tspan fill="#e63946">+</tspan></text>
  <text x="38" y="256" font-family="Arial" font-size="7" fill="#8892b0">YEARS CODING</text>
  <text x="110" y="244" font-family="Arial" font-size="16" fill="#eef2ff" font-weight="bold">10<tspan fill="#e63946">+</tspan></text>
  <text x="110" y="256" font-family="Arial" font-size="7" fill="#8892b0">PROJECTS</text>
  <text x="180" y="244" font-family="Arial" font-size="16" fill="#eef2ff" font-weight="bold">16<tspan fill="#e63946">+</tspan></text>
  <text x="180" y="256" font-family="Arial" font-size="7" fill="#8892b0">CERTIFICATIONS</text>

  <!-- Profile image placeholder (right side) -->
  <!-- Spinning ring outer -->
  <circle cx="460" cy="150" r="90" fill="none" stroke="rgba(230,57,70,0.08)" stroke-width="1" stroke-dasharray="4 6"/>
  <!-- Orbit dot -->
  <circle cx="460" cy="62" r="5" fill="#e63946" opacity="0.8"/>

  <!-- Gradient ring -->
  <circle cx="460" cy="150" r="75" fill="none" stroke="url(#accent10)" stroke-width="2" stroke-dasharray="180 80"/>
  <!-- Inner circle (profile photo area) -->
  <circle cx="460" cy="150" r="70" fill="#111827" stroke="#1e2a3a" stroke-width="2"/>
  <!-- Profile silhouette -->
  <circle cx="460" cy="130" r="24" fill="#1e2a3a"/>
  <ellipse cx="460" cy="185" rx="38" ry="28" fill="#1e2a3a"/>
  <circle cx="460" cy="130" r="20" fill="#2d3748"/>
  <ellipse cx="460" cy="182" rx="32" ry="22" fill="#2d3748"/>

  <!-- "Open Source" badge -->
  <rect x="392" y="228" width="90" height="24" rx="12" fill="#0e1420" stroke="rgba(230,57,70,0.3)" stroke-width="1"/>
  <circle cx="406" cy="240" r="4" fill="#22c55e"/>
  <text x="442" y="244" font-family="Arial" font-size="8" fill="#eef2ff" text-anchor="middle">Open Source</text>

  <!-- Project mini-cards bottom -->
  <rect x="0" y="270" width="600" height="50" fill="#0e1420"/>
  <rect x="0" y="270" width="600" height="1" fill="rgba(255,255,255,0.07)"/>
  <rect x="16" y="280" width="80" height="28" rx="6" fill="#111827" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="104" y="280" width="80" height="28" rx="6" fill="#111827" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="192" y="280" width="80" height="28" rx="6" fill="#111827" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="280" y="280" width="80" height="28" rx="6" fill="#111827" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="368" y="280" width="80" height="28" rx="6" fill="#111827" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="456" y="280" width="80" height="28" rx="6" fill="#111827" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Card labels -->
  <text x="56" y="297" font-family="Arial" font-size="7" fill="#8892b0" text-anchor="middle">Portfolio</text>
  <text x="144" y="297" font-family="Arial" font-size="7" fill="#8892b0" text-anchor="middle">Projects</text>
  <text x="232" y="297" font-family="Arial" font-size="7" fill="#8892b0" text-anchor="middle">Blog</text>
  <text x="320" y="297" font-family="Arial" font-size="7" fill="#8892b0" text-anchor="middle">About</text>
  <text x="408" y="297" font-family="Arial" font-size="7" fill="#8892b0" text-anchor="middle">Resume</text>
  <text x="496" y="297" font-family="Arial" font-size="7" fill="#8892b0" text-anchor="middle">Contact</text>

  <!-- GSAP / HTML/CSS label -->
  <rect x="528" y="280" width="0" height="0"/>
  <text x="540" y="262" font-family="monospace" font-size="8" fill="#e63946" opacity="0.5">GSAP • HTML • CSS</text>
</svg>
