<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="red1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="320" fill="url(#bg1)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="80" x2="600" y2="80" stroke="#ffffff06" stroke-width="1"/>
  <line x1="0" y1="160" x2="600" y2="160" stroke="#ffffff06" stroke-width="1"/>
  <line x1="0" y1="240" x2="600" y2="240" stroke="#ffffff06" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="320" stroke="#ffffff06" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="320" stroke="#ffffff06" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="320" stroke="#ffffff06" stroke-width="1"/>

  <!-- Top navbar bar -->
  <rect x="0" y="0" width="600" height="44" fill="#212121"/>
  <rect x="0" y="44" width="600" height="1" fill="#333"/>

  <!-- YouTube logo area -->
  <rect x="16" y="12" width="20" height="20" rx="4" fill="url(#red1)"/>
  <polygon points="22,16 22,28 31,22" fill="white"/>
  <rect x="42" y="17" width="52" height="10" rx="2" fill="#aaa"/>

  <!-- Search bar -->
  <rect x="170" y="13" width="220" height="18" rx="9" fill="#121212" stroke="#383838" stroke-width="1"/>
  <rect x="390" y="13" width="30" height="18" rx="0 9 9 0" fill="#222"/>
  <circle cx="185" cy="22" r="4" fill="none" stroke="#666" stroke-width="1.5"/>
  <line x1="188" y1="25" x2="191" y2="28" stroke="#666" stroke-width="1.5"/>

  <!-- Nav icons right -->
  <circle cx="455" cy="22" r="8" fill="#3f3f3f"/>
  <circle cx="478" cy="22" r="8" fill="#3f3f3f"/>
  <circle cx="501" cy="22" r="8" fill="#3f3f3f"/>
  <circle cx="528" cy="22" r="10" fill="#555"/>

  <!-- Sidebar -->
  <rect x="0" y="45" width="70" height="275" fill="#212121"/>
  <!-- sidebar items -->
  <rect x="10" y="60" width="50" height="6" rx="3" fill="#ff0000"/>
  <rect x="10" y="76" width="50" height="4" rx="2" fill="#444"/>
  <rect x="10" y="90" width="50" height="4" rx="2" fill="#444"/>
  <rect x="10" y="104" width="50" height="4" rx="2" fill="#444"/>
  <rect x="10" y="118" width="50" height="4" rx="2" fill="#444"/>
  <rect x="10" y="140" width="50" height="1" fill="#333"/>
  <rect x="10" y="152" width="50" height="4" rx="2" fill="#444"/>
  <rect x="10" y="166" width="50" height="4" rx="2" fill="#444"/>
  <rect x="10" y="180" width="50" height="4" rx="2" fill="#444"/>

  <!-- Main content area - video grid -->
  <!-- Row 1 -->
  <!-- Card 1 -->
  <rect x="82" y="56" width="155" height="88" rx="4" fill="#1e3a5f"/>
  <rect x="82" y="56" width="155" height="88" rx="4" fill="#1565c0" opacity="0.3"/>
  <circle cx="160" cy="100" r="18" fill="#ff000066"/>
  <polygon points="154,92 154,108 170,100" fill="white" opacity="0.9"/>
  <rect x="194" y="144" width="8" height="6" rx="1" fill="#ff0000"/>
  <rect x="82" y="148" width="110" height="5" rx="2" fill="#aaa"/>
  <rect x="82" y="157" width="80" height="4" rx="2" fill="#666"/>
  <rect x="82" y="165" width="60" height="4" rx="2" fill="#555"/>

  <!-- Card 2 -->
  <rect x="249" y="56" width="155" height="88" rx="4" fill="#1a3a1a"/>
  <rect x="249" y="56" width="155" height="88" rx="4" fill="#2e7d32" opacity="0.3"/>
  <circle cx="327" cy="100" r="18" fill="#ff000066"/>
  <polygon points="321,92 321,108 337,100" fill="white" opacity="0.9"/>
  <rect x="249" y="148" width="110" height="5" rx="2" fill="#aaa"/>
  <rect x="249" y="157" width="80" height="4" rx="2" fill="#666"/>
  <rect x="249" y="165" width="60" height="4" rx="2" fill="#555"/>

  <!-- Card 3 -->
  <rect x="416" y="56" width="155" height="88" rx="4" fill="#3a1a1a"/>
