  <circle cx="494" cy="100" r="18" fill="#ff000066"/>
  <polygon points="488,92 488,108 504,100" fill="white" opacity="0.9"/>
  <rect x="416" y="148" width="110" height="5" rx="2" fill="#aaa"/>
  <rect x="416" y="157" width="80" height="4" rx="2" fill="#666"/>
  <rect x="416" y="165" width="60" height="4" rx="2" fill="#555"/>

  <!-- Row 2 -->
  <rect x="82" y="186" width="155" height="88" rx="4" fill="#2a1a3a"/>
  <rect x="82" y="186" width="155" height="88" rx="4" fill="#6a1b9a" opacity="0.3"/>
  <circle cx="160" cy="230" r="18" fill="#ff000066"/>
  <polygon points="154,222 154,238 170,230" fill="white" opacity="0.9"/>
  <rect x="82" y="278" width="110" height="5" rx="2" fill="#aaa"/>
  <rect x="82" y="287" width="80" height="4" rx="2" fill="#666"/>

  <rect x="249" y="186" width="155" height="88" rx="4" fill="#1a2a3a"/>
  <rect x="249" y="186" width="155" height="88" rx="4" fill="#0277bd" opacity="0.3"/>
  <circle cx="327" cy="230" r="18" fill="#ff000066"/>
  <polygon points="321,222 321,238 337,230" fill="white" opacity="0.9"/>
  <rect x="249" y="278" width="110" height="5" rx="2" fill="#aaa"/>
  <rect x="249" y="287" width="80" height="4" rx="2" fill="#666"/>

  <rect x="416" y="186" width="155" height="88" rx="4" fill="#1a3a2a"/>
  <rect x="416" y="186" width="155" height="88" rx="4" fill="#00695c" opacity="0.3"/>
  <circle cx="494" cy="230" r="18" fill="#ff000066"/>
  <polygon points="488,222 488,238 504,230" fill="white" opacity="0.9"/>
