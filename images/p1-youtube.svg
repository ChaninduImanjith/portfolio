  <!-- YouTube label -->
  <rect x="16" y="292" width="44" height="16" rx="3" fill="#ff0000" opacity="0.9" filter="url(#glow1)"/>
  <text x="38" y="304" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold">YouTube</text>
