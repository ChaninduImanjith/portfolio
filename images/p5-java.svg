  <!-- Code content - Java syntax highlighted -->
  <text x="64" y="86" font-family="monospace" font-size="9" fill="#569cd6">public class </text>
  <text x="152" y="86" font-family="monospace" font-size="9" fill="#4ec9b0">Main </text>
  <text x="185" y="86" font-family="monospace" font-size="9" fill="#d4d4d4">{</text>

  <text x="64" y="100" font-family="monospace" font-size="9" fill="#6a9955">    // Java OOP — Fibonacci + Sorting</text>

  <text x="64" y="114" font-family="monospace" font-size="9" fill="#569cd6">    public static </text>
  <text x="193" y="114" font-family="monospace" font-size="9" fill="#569cd6">void </text>
  <text x="224" y="114" font-family="monospace" font-size="9" fill="#dcdcaa">main</text>
  <text x="261" y="114" font-family="monospace" font-size="9" fill="#d4d4d4">(String[] </text>
  <text x="328" y="114" font-family="monospace" font-size="9" fill="#9cdcfe">args</text>
  <text x="358" y="114" font-family="monospace" font-size="9" fill="#d4d4d4">) {</text>

  <text x="64" y="128" font-family="monospace" font-size="9" fill="#d4d4d4">        </text>
  <text x="84" y="128" font-family="monospace" font-size="9" fill="#569cd6">int</text>
  <text x="104" y="128" font-family="monospace" font-size="9" fill="#9cdcfe">[] arr</text>
  <text x="148" y="128" font-family="monospace" font-size="9" fill="#d4d4d4"> = {</text>
  <text x="176" y="128" font-family="monospace" font-size="9" fill="#b5cea8">5, 3, 8, 1, 9, 2, 7</text>
  <text x="334" y="128" font-family="monospace" font-size="9" fill="#d4d4d4">};</text>

  <text x="64" y="142" font-family="monospace" font-size="9" fill="#dcdcaa">        bubbleSort</text>
  <text x="185" y="142" font-family="monospace" font-size="9" fill="#d4d4d4">(arr);</text>

  <text x="64" y="156" font-family="monospace" font-size="9" fill="#4ec9b0">        System</text>
  <text x="141" y="156" font-family="monospace" font-size="9" fill="#d4d4d4">.out.</text>
  <text x="175" y="156" font-family="monospace" font-size="9" fill="#dcdcaa">println</text>
  <text x="221" y="156" font-family="monospace" font-size="9" fill="#d4d4d4">(</text>
  <text x="230" y="156" font-family="monospace" font-size="9" fill="#ce9178">"Sorted!"</text>
  <text x="292" y="156" font-family="monospace" font-size="9" fill="#d4d4d4">);</text>

  <text x="64" y="170" font-family="monospace" font-size="9" fill="#d4d4d4">    }</text>

  <text x="64" y="184" font-family="monospace" font-size="9" fill="#569cd6">    static </text>
  <text x="130" y="184" font-family="monospace" font-size="9" fill="#569cd6">void </text>
  <text x="162" y="184" font-family="monospace" font-size="9" fill="#dcdcaa">bubbleSort</text>
  <text x="247" y="184" font-family="monospace" font-size="9" fill="#d4d4d4">(</text>
  <text x="255" y="184" font-family="monospace" font-size="9" fill="#569cd6">int</text>
  <text x="275" y="184" font-family="monospace" font-size="9" fill="#9cdcfe">[] a</text>
  <text x="306" y="184" font-family="monospace" font-size="9" fill="#d4d4d4">) {</text>

  <text x="64" y="198" font-family="monospace" font-size="9" fill="#569cd6">        for </text>
  <text x="110" y="198" font-family="monospace" font-size="9" fill="#d4d4d4">(</text>
  <text x="118" y="198" font-family="monospace" font-size="9" fill="#569cd6">int </text>
  <text x="142" y="198" font-family="monospace" font-size="9" fill="#9cdcfe">i</text>
  <text x="150" y="198" font-family="monospace" font-size="9" fill="#d4d4d4">=</text>
  <text x="158" y="198" font-family="monospace" font-size="9" fill="#b5cea8">0</text>
  <text x="165" y="198" font-family="monospace" font-size="9" fill="#d4d4d4">; i&lt;a.length-</text>
  <text x="253" y="198" font-family="monospace" font-size="9" fill="#b5cea8">1</text>
  <text x="260" y="198" font-family="monospace" font-size="9" fill="#d4d4d4">; i++) {</text>

  <text x="64" y="212" font-family="monospace" font-size="9" fill="#569cd6">            for </text>
  <text x="124" y="212" font-family="monospace" font-size="9" fill="#d4d4d4">(</text>
  <text x="132" y="212" font-family="monospace" font-size="9" fill="#569cd6">int </text>
  <text x="156" y="212" font-family="monospace" font-size="9" fill="#9cdcfe">j</text>
  <text x="163" y="212" font-family="monospace" font-size="9" fill="#d4d4d4">=</text>
  <text x="171" y="212" font-family="monospace" font-size="9" fill="#b5cea8">0</text>
  <text x="178" y="212" font-family="monospace" font-size="9" fill="#d4d4d4">; j&lt;a.length-i-</text>
  <text x="286" y="212" font-family="monospace" font-size="9" fill="#b5cea8">1</text>
  <text x="293" y="212" font-family="monospace" font-size="9" fill="#d4d4d4">; j++)</text>

  <text x="64" y="226" font-family="monospace" font-size="9" fill="#d4d4d4">                </text>
  <text x="84" y="226" font-family="monospace" font-size="9" fill="#c586c0">if </text>
  <text x="101" y="226" font-family="monospace" font-size="9" fill="#d4d4d4">(a[j] &gt; a[j+</text>
  <text x="187" y="226" font-family="monospace" font-size="9" fill="#b5cea8">1</text>
  <text x="194" y="226" font-family="monospace" font-size="9" fill="#d4d4d4">]) swap(a, j, j+</text>
  <text x="314" y="226" font-family="monospace" font-size="9" fill="#b5cea8">1</text>
  <text x="320" y="226" font-family="monospace" font-size="9" fill="#d4d4d4">);</text>

  <text x="64" y="240" font-family="monospace" font-size="9" fill="#d4d4d4">    }</text>
  <text x="64" y="254" font-family="monospace" font-size="9" fill="#d4d4d4">}</text>

