  <!-- Run 3 - Failed -->
  <rect x="195" y="196" width="394" height="52" fill="#0d1117"/>
  <circle cx="215" cy="222" r="9" fill="#3d1a1a"/>
  <text x="215" y="226" font-family="Arial" font-size="10" fill="#f85149" text-anchor="middle">✗</text>
  <text x="234" y="214" font-family="Arial" font-size="9" fill="#f0f6fc" font-weight="bold">refactor: migrate to ECR registry</text>
  <text x="234" y="226" font-family="monospace" font-size="7" fill="#8b949e">main · #45 · triggered by push · 3 hrs ago</text>
  <rect x="234" y="232" width="36" height="10" rx="5" fill="#3d1a1a"/>
  <text x="252" y="240" font-family="Arial" font-size="7" fill="#f85149" text-anchor="middle">failure</text>
  <text x="520" y="226" font-family="monospace" font-size="8" fill="#8b949e">0m 47s</text>
  <rect x="195" y="248" width="394" height="1" fill="#21262d"/>

  <!-- Run 4 - Running -->
  <rect x="195" y="249" width="394" height="52" fill="#0d1117"/>
  <!-- animated looking spinner -->
  <circle cx="215" cy="275" r="9" fill="#0c1e3d"/>
  <circle cx="215" cy="275" r="7" fill="none" stroke="#1f6feb" stroke-width="2" stroke-dasharray="22 12"/>
  <text x="234" y="267" font-family="Arial" font-size="9" fill="#f0f6fc" font-weight="bold">chore: update AWS credentials</text>
  <text x="234" y="279" font-family="monospace" font-size="7" fill="#8b949e">main · #48 · triggered just now</text>
  <rect x="234" y="285" width="60" height="10" rx="5" fill="#0c1e3d"/>
  <text x="264" y="293" font-family="Arial" font-size="7" fill="#58a6ff" text-anchor="middle">in progress</text>
  <text x="520" y="279" font-family="monospace" font-size="8" fill="#8b949e">running...</text>

  <!-- YAML snippet floating -->
  <rect x="198" y="306" width="390" height="12" fill="#161b22"/>
  <text x="210" y="316" font-family="monospace" font-size="7" fill="#4a7ab5">on: [push] → build → docker-push → aws-deploy → notify</text>
