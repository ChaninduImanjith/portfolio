  <text x="22" y="116" font-family="monospace" font-size="8" fill="#8b949e">🐳 Docker Build</text>
  <text x="22" y="136" font-family="monospace" font-size="8" fill="#8b949e">☁️ AWS Deploy</text>
  <text x="22" y="156" font-family="monospace" font-size="8" fill="#8b949e">🧪 Unit Tests</text>
  <text x="22" y="176" font-family="monospace" font-size="8" fill="#8b949e">🔒 Security Scan</text>

  <!-- Main Actions area -->
  <!-- Run header -->
  <rect x="195" y="52" width="394" height="30" fill="#0d1117"/>
