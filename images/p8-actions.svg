  <rect x="480" y="55" width="100" height="20" rx="5" fill="#238636"/>
  <text x="530" y="69" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Run workflow ▼</text>

  <!-- Run entries -->
  <!-- Run 1 - Success -->
  <rect x="195" y="90" width="394" height="52" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <circle cx="215" cy="116" r="9" fill="#0e4429"/>
  <text x="215" y="120" font-family="Arial" font-size="10" fill="#28c840" text-anchor="middle">✓</text>
  <text x="234" y="108" font-family="Arial" font-size="9" fill="#f0f6fc" font-weight="bold">Fix: update Docker base image</text>
  <text x="234" y="120" font-family="monospace" font-size="7" fill="#8b949e">main · #47 · triggered by push · 3 min ago</text>
  <rect x="234" y="126" width="40" height="10" rx="5" fill="#0e4429"/>
