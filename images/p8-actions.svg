  <text x="520" y="120" font-family="monospace" font-size="8" fill="#8b949e">2m 34s</text>
  <rect x="195" y="142" width="394" height="1" fill="#21262d"/>

  <!-- Run 2 - Success -->
  <rect x="195" y="143" width="394" height="52" fill="#0d1117" stroke="#21262d" stroke-width="0"/>
  <circle cx="215" cy="169" r="9" fill="#0e4429"/>
  <text x="215" y="173" font-family="Arial" font-size="10" fill="#28c840" text-anchor="middle">✓</text>
  <text x="234" y="161" font-family="Arial" font-size="9" fill="#f0f6fc" font-weight="bold">feat: add health check endpoint</text>
  <text x="234" y="173" font-family="monospace" font-size="7" fill="#8b949e">main · #46 · triggered by push · 1 hr ago</text>
  <rect x="234" y="179" width="40" height="10" rx="5" fill="#0e4429"/>
  <text x="254" y="187" font-family="Arial" font-size="7" fill="#3fb950" text-anchor="middle">success</text>
  <text x="520" y="173" font-family="monospace" font-size="8" fill="#8b949e">1m 58s</text>
