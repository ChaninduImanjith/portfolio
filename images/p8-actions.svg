  <rect x="44" y="14" width="90" height="16" rx="3" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="89" y="25" font-family="monospace" font-size="7" fill="#8b949e" text-anchor="middle">ChaninduImanjith / …</text>
  <!-- Nav -->
  <text x="240" y="26" font-family="Arial" font-size="9" fill="#8b949e">⌚ Actions</text>
  <rect x="234" y="38" width="56" height="2" fill="#f9826c" rx="1"/>

