  <text x="502" y="266" font-family="Arial" font-size="7" fill="#ca4828" text-anchor="middle">☕ Java</text>
  <rect x="310" y="276" width="55" height="14" rx="7" fill="#f05033" opacity="0.2" stroke="#f05033" stroke-width="0.5"/>
