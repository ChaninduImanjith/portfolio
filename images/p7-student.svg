  </defs>

  <rect width="600" height="320" fill="url(#bg7)"/>

  <!-- React-style app window -->
  <rect x="15" y="14" width="570" height="292" rx="10" fill="#0f1924" stroke="#1e344e" stroke-width="1"/>

