<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1529"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d33833"/>
      <stop offset="40%" style="stop-color:#f0a500"/>
      <stop offset="70%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="320" fill="url(#bg3)"/>

  <!-- Background grid -->
  <pattern id="grid3" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff05" stroke-width="0.5"/>
  </pattern>
  <rect width="600" height="320" fill="url(#grid3)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="600" height="38" fill="#0d1529"/>
  <rect x="0" y="38" width="600" height="1" fill="#1e3a6e22"/>
  <circle cx="16" cy="19" r="5" fill="#ff5f57"/>
  <circle cx="30" cy="19" r="5" fill="#febc2e"/>
  <circle cx="44" cy="19" r="5" fill="#28c840"/>
  <text x="300" y="24" font-family="monospace" font-size="11" fill="#4a7ab5" text-anchor="middle">Jenkins CI/CD Pipeline — AWS Deploy</text>

  <!-- Pipeline stages - horizontal flow -->
  <!-- Stage 1: Source -->
  <rect x="28" y="80" width="88" height="80" rx="8" fill="#0d1f3c" stroke="#1e3f7a" stroke-width="1.5"/>
  <rect x="28" y="80" width="88" height="6" rx="8" fill="#3b82f6"/>
  <rect x="28" y="83" width="88" height="3" fill="#3b82f6"/>
  <text x="72" y="112" font-family="monospace" font-size="9" fill="#7ba3c8" text-anchor="middle">SOURCE</text>
  <rect x="38" y="118" width="68" height="3" rx="1" fill="#1e3a6e"/>
  <rect x="38" y="125" width="50" height="3" rx="1" fill="#1e3a6e"/>
  <rect x="38" y="132" width="60" height="3" rx="1" fill="#1e3a6e"/>
  <!-- Tick -->
  <circle cx="72" cy="102" r="8" fill="#3b82f6" opacity="0.2"/>
  <text x="72" y="106" font-family="Arial" font-size="10" fill="#3b82f6" text-anchor="middle">✓</text>

  <!-- Arrow 1 -->
  <line x1="116" y1="120" x2="138" y2="120" stroke="url(#pipe)" stroke-width="2.5" filter="url(#softglow)"/>
  <polygon points="134,116 142,120 134,124" fill="#f0a500"/>

  <!-- Stage 2: Build -->
  <rect x="142" y="80" width="88" height="80" rx="8" fill="#0d1f3c" stroke="#f0a500" stroke-width="1.5"/>
  <rect x="142" y="80" width="88" height="6" rx="8" fill="#f0a500"/>
  <rect x="142" y="83" width="88" height="3" fill="#f0a500"/>
  <text x="186" y="112" font-family="monospace" font-size="9" fill="#f0a500" text-anchor="middle">BUILD</text>
  <rect x="152" y="118" width="68" height="3" rx="1" fill="#2a3d15"/>
  <rect x="152" y="125" width="50" height="3" rx="1" fill="#2a3d15"/>
  <rect x="152" y="132" width="60" height="3" rx="1" fill="#2a3d15"/>
  <circle cx="186" cy="102" r="8" fill="#f0a500" opacity="0.2"/>
  <!-- Loading spinner feel -->
  <circle cx="186" cy="102" r="6" fill="none" stroke="#f0a500" stroke-width="1.5" stroke-dasharray="20 18"/>

  <!-- Arrow 2 -->
  <line x1="230" y1="120" x2="252" y2="120" stroke="url(#pipe)" stroke-width="2.5" filter="url(#softglow)"/>
  <polygon points="248,116 256,120 248,124" fill="#10b981"/>

  <!-- Stage 3: Test -->
  <rect x="256" y="80" width="88" height="80" rx="8" fill="#0d1f3c" stroke="#10b981" stroke-width="1.5"/>
  <rect x="256" y="80" width="88" height="6" rx="8" fill="#10b981"/>
  <rect x="256" y="83" width="88" height="3" fill="#10b981"/>
  <text x="300" y="112" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle">TEST</text>
  <rect x="266" y="118" width="68" height="3" rx="1" fill="#1a3d2a"/>
  <rect x="266" y="125" width="50" height="3" rx="1" fill="#1a3d2a"/>
  <rect x="266" y="132" width="60" height="3" rx="1" fill="#1a3d2a"/>
  <circle cx="300" cy="102" r="8" fill="#10b981" opacity="0.2"/>
  <text x="300" y="106" font-family="Arial" font-size="10" fill="#10b981" text-anchor="middle">✓</text>

  <!-- Arrow 3 -->
  <line x1="344" y1="120" x2="366" y2="120" stroke="#10b981" stroke-width="2.5" filter="url(#softglow)"/>
  <polygon points="362,116 370,120 362,124" fill="#10b981"/>

  <!-- Stage 4: Docker -->
  <rect x="370" y="80" width="88" height="80" rx="8" fill="#0d1f3c" stroke="#2496ed" stroke-width="1.5"/>
  <rect x="370" y="80" width="88" height="6" rx="8" fill="#2496ed"/>
  <rect x="370" y="83" width="88" height="3" fill="#2496ed"/>
  <text x="414" y="112" font-family="monospace" font-size="9" fill="#2496ed" text-anchor="middle">DOCKER</text>
  <rect x="380" y="118" width="68" height="3" rx="1" fill="#0d2040"/>
  <rect x="380" y="125" width="50" height="3" rx="1" fill="#0d2040"/>
  <rect x="380" y="132" width="60" height="3" rx="1" fill="#0d2040"/>
  <circle cx="414" cy="102" r="8" fill="#2496ed" opacity="0.2"/>
  <text x="414" y="106" font-family="Arial" font-size="10" fill="#2496ed" text-anchor="middle">✓</text>

  <!-- Arrow 4 -->
  <line x1="458" y1="120" x2="480" y2="120" stroke="#10b981" stroke-width="2.5" filter="url(#softglow)"/>
  <polygon points="476,116 484,120 476,124" fill="#10b981"/>

  <!-- Stage 5: Deploy AWS -->
  <rect x="484" y="80" width="88" height="80" rx="8" fill="#0d2a1a" stroke="#10b981" stroke-width="1.5"/>
  <rect x="484" y="80" width="88" height="6" rx="8" fill="#10b981"/>
  <rect x="484" y="83" width="88" height="3" fill="#10b981"/>
  <text x="528" y="108" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle">DEPLOY</text>
  <text x="528" y="118" font-family="monospace" font-size="8" fill="#4aaa80" text-anchor="middle">AWS</text>
  <rect x="494" y="125" width="68" height="3" rx="1" fill="#1a3d2a"/>
  <rect x="494" y="132" width="50" height="3" rx="1" fill="#1a3d2a"/>
  <circle cx="528" cy="100" r="7" fill="#10b981" opacity="0.25" filter="url(#glow3)"/>
  <text x="528" y="104" font-family="Arial" font-size="9" fill="#10b981" text-anchor="middle">✓</text>

  <!-- Log terminal area -->
  <rect x="28" y="176" width="544" height="118" rx="6" fill="#050c1a" stroke="#1e3a6e" stroke-width="1"/>
  <rect x="28" y="176" width="544" height="22" rx="6" fill="#0d1a30"/>
  <rect x="28" y="186" width="544" height="12" fill="#0d1a30"/>
  <circle cx="42" cy="188" r="4" fill="#ff5f57" opacity="0.7"/>
  <circle cx="54" cy="188" r="4" fill="#febc2e" opacity="0.7"/>
  <circle cx="66" cy="188" r="4" fill="#28c840" opacity="0.7"/>
  <text x="300" y="192" font-family="monospace" font-size="8" fill="#3d5a7a" text-anchor="middle">Console Output</text>

  <text x="42" y="215" font-family="monospace" font-size="8" fill="#4aaa80">[Pipeline] Started</text>
  <text x="42" y="228" font-family="monospace" font-size="8" fill="#7ba3c8">[Pipeline] { (Declarative: Checkout SCM)</text>
  <text x="42" y="241" font-family="monospace" font-size="8" fill="#f0a500">[Pipeline] sh: docker build -t myapp:latest .</text>
  <text x="42" y="254" font-family="monospace" font-size="8" fill="#4aaa80">[Pipeline] Successfully built 3f2a1b4c9d</text>
  <text x="42" y="267" font-family="monospace" font-size="8" fill="#4aaa80">[Pipeline] Pushed to ECR: myapp:latest</text>
  <text x="42" y="280" font-family="monospace" font-size="8" fill="#10b981" filter="url(#softglow)">[Pipeline] Finished: SUCCESS ✓</text>

  <!-- Cursor blink -->
  <rect x="42" y="284" width="6" height="8" rx="1" fill="#10b981" opacity="0.7"/>
</svg>
